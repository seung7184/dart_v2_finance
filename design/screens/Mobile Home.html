<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dart Finance — Mobile Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="components.css" />
    <style>
      html,
      body {
        height: 100%;
        background: #06070a;
      }
      body {
        display: grid;
        place-items: center;
        padding: 40px 16px;
        overflow-x: hidden;
      }
      .stage {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 48px;
        flex-wrap: wrap;
      }
      .caption {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        color: var(--text-tertiary);
        font-family: var(--font-sans);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        opacity: 0.7;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div id="frame"></div>
    </div>
    <div class="caption">Dart Finance · Mobile Home · nl-NL</div>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <script type="text/babel" src="src/shared.jsx"></script>
    <script type="text/babel" src="src/ios-frame.jsx"></script>
    <script type="text/babel" src="src/mobile-home.jsx"></script>

    <script type="text/babel">
      const { IOSDevice, MobileHomeScreen } = window;

      const App = () => (
        <IOSDevice dark width={390} height={844}>
          <MobileHomeScreen />
        </IOSDevice>
      );

      ReactDOM.createRoot(document.getElementById("frame")).render(<App />);
    </script>
  </body>
</html>
